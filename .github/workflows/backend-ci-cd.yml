name: Backend CI/CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: "Confirm backend deploy now"
        required: true
        type: boolean
        default: false
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - production
        default: production

jobs:
  ci:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Static syntax check
        shell: bash
        run: |
          set -euo pipefail
          find src -name "*.js" -print0 | xargs -0 -n1 node --check

  deploy:
    name: Backend Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_deploy == 'true')

    steps:
      - name: Show deploy context
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "environment=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}"

      - name: Trigger backend deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.BACKEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${DEPLOY_HOOK_URL}" ]; then
            echo "Missing BACKEND_DEPLOY_HOOK_URL secret"
            exit 1
          fi
          curl -fsS -X POST "${DEPLOY_HOOK_URL}"
